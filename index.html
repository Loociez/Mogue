<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mogue Classic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void: #05060a;
      --bg-panel: #12141f;
      --bg-panel-2: #191c2b;
      --bg-panel-3: #1f2333;
      --border-gold: #a9812f;
      --border-gold-bright: #e8c766;
      --border-dim: #333850;
      --text-parchment: #ece4cf;
      --text-dim: #8890a6;
      --accent-blue: #5fb8ff;
      --accent-purple: #b98bff;
      --accent-green: #7ee08a;
      --hp-red-1: #ff5b5b;
      --hp-red-2: #a3131f;
      --xp-blue-1: #6fd3ff;
      --xp-blue-2: #1f6fb8;
      --shadow-deep: 0 6px 20px rgba(0,0,0,0.6);
      --font-display: 'Cinzel', serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(ellipse at 50% 0%, #131629 0%, var(--bg-void) 60%);
      font-family: var(--font-body);
      color: var(--text-parchment);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* ---------- Shared panel/button design system ---------- */
    .panel {
      background: linear-gradient(180deg, var(--bg-panel-2) 0%, var(--bg-panel) 100%);
      border: 2px solid var(--border-gold);
      border-radius: 10px;
      box-shadow: var(--shadow-deep), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
    }
    .panel::before {
      content: "";
      position: absolute;
      inset: 3px;
      border: 1px solid rgba(169,129,47,0.35);
      border-radius: 7px;
      pointer-events: none;
    }

    .btn {
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: 0.03em;
      background: linear-gradient(180deg, #2a2f45 0%, #171a28 100%);
      color: var(--text-parchment);
      border: 1px solid var(--border-gold);
      border-radius: 6px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .btn:hover:not(:disabled) {
      background: linear-gradient(180deg, #363c58 0%, #1f2334 100%);
      border-color: var(--border-gold-bright);
      box-shadow: 0 2px 10px rgba(232,199,102,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
      transform: translateY(-1px);
    }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    h1, h2, h3 { font-family: var(--font-display); margin: 0; }

    /* ---------- HUD ---------- */
    #hud {
      width: 100%;
      max-width: 1024px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      margin-bottom: 8px;
      font-size: 13px;
      z-index: 100;
    }

    .stat-block { display: flex; align-items: center; gap: 6px; flex: 1 1 160px; min-width: 120px; }
    .stat-icon { font-size: 16px; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.6)); }
    .stat-bar-wrap {
      position: relative;
      flex: 1;
      height: 18px;
      background: #0c0e16;
      border: 1px solid var(--border-dim);
      border-radius: 9px;
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
    }
    .stat-bar {
      height: 100%;
      border-radius: 9px 0 0 9px;
      transition: width 0.25s ease;
    }
    .hp-bar { background: linear-gradient(180deg, var(--hp-red-1), var(--hp-red-2)); box-shadow: 0 0 8px rgba(255,60,60,0.5); }
    .xp-bar { background: linear-gradient(180deg, var(--xp-blue-1), var(--xp-blue-2)); box-shadow: 0 0 8px rgba(95,184,255,0.5); }
    .stat-bar-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10.5px;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.9);
      white-space: nowrap;
    }

    .stat-chip {
      background: var(--bg-panel-3);
      border: 1px solid var(--border-dim);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11.5px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .stat-chip.gold { color: #f0c95c; border-color: #6b5423; }

    .hud-buttons { display: flex; gap: 6px; }
    #hud .btn { padding: 7px 11px; font-size: 12px; }
    #shopBtn:hover { border-color: #f0c95c; }
    #skillsBtn:hover { border-color: var(--accent-green); }

    canvas {
      display: block;
      image-rendering: pixelated;
      border: 2px solid var(--border-gold);
      border-radius: 4px;
      margin: 0 auto;
      box-shadow: var(--shadow-deep);
    }

    /* ---------- Character Selection UI ---------- */
    #characterSelect {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 26px 30px;
      display: none;
      text-align: center;
      z-index: 1000;
      width: min(92vw, 340px);
      max-height: 90vh;
      overflow-y: auto;
    }
    #characterSelect h2 {
      margin-bottom: 14px;
      font-size: 22px;
      color: var(--border-gold-bright);
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      letter-spacing: 0.04em;
    }
    #characterSelect h3 { font-size: 15px; color: var(--text-parchment); }
    #characterSelect button.btn {
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      font-size: 14px;
    }
    #characterSelect p { color: var(--text-dim); font-family: var(--font-body); font-size: 13px; margin: 4px 0; }

    /* Sprite preview canvas */
    #selectedSpriteCanvas {
      width: 48px;
      height: 48px;
      border: 2px solid var(--border-gold);
      border-radius: 6px;
      margin-bottom: 10px;
      image-rendering: pixelated;
      background: var(--bg-panel-3);
    }

    /* Custom Sprite Dropdown */
    .dropdown {
      position: relative;
      width: 220px;
      margin: 10px auto;
      cursor: pointer;
      user-select: none;
      background: var(--bg-panel-3);
      border: 1px solid var(--border-gold);
      border-radius: 6px;
      color: var(--text-parchment);
      font-family: var(--font-body);
    }

    #spriteSelected { padding: 7px 10px; }

    .dropdown-options {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      max-height: 250px;
      overflow-y: auto;
      background: var(--bg-panel-3);
      border: 1px solid var(--border-gold);
      border-radius: 6px;
      z-index: 1000;
    }

    .dropdown-option { display: flex; align-items: center; gap: 8px; padding: 4px 6px; }
    .dropdown-option canvas { width: 32px; height: 32px; image-rendering: pixelated; border: 1px solid var(--border-dim); }
    .dropdown-option:hover { background: var(--bg-panel-2); }

    /* ---------- Mobile touch controls: joystick ---------- */
    #mobile-controls {
      position: fixed;
      bottom: 30px;
      left: 30px;
      z-index: 2000;
      user-select: none;
    }
    #joystickBase {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(54,60,88,0.55), rgba(15,17,26,0.55) 75%);
      border: 2px solid var(--border-gold);
      box-shadow: var(--shadow-deep);
      position: relative;
      touch-action: none;
    }
    #joystickKnob {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #4d5578, #1c1f2e 80%);
      border: 2px solid var(--border-gold-bright);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: var(--shadow-deep);
      pointer-events: none;
      transition: transform 0.05s linear;
    }

    #mobile-actions {
      position: fixed;
      bottom: 40px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 2000;
      user-select: none;
    }
    #mobile-actions button.control {
      width: 70px;
      height: 70px;
      font-size: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #363c58, #14161f 75%);
      color: var(--text-parchment);
      border: 1px solid var(--border-gold);
      touch-action: none;
      box-shadow: var(--shadow-deep);
    }
    #mobile-actions #btnSpecial,
    #mobile-actions #btnShop,
    #mobile-actions #btnSkills {
      width: 52px;
      height: 52px;
      font-size: 20px;
      align-self: flex-end;
    }

    /* ---------- Mute button ---------- */
    #muteBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 2000;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--border-gold);
      background: var(--bg-panel);
      color: var(--text-parchment);
      cursor: pointer;
      font-family: var(--font-body);
      box-shadow: var(--shadow-deep);
    }
    #muteBtn:hover { border-color: var(--border-gold-bright); }
  </style>
</head>
<body>
  <!-- HUD -->
  <div id="hud" class="panel">
    <div class="stat-block">
      <span class="stat-icon">❤️</span>
      <div class="stat-bar-wrap">
        <div class="stat-bar hp-bar" id="hpBarFill" style="width:100%"></div>
        <div class="stat-bar-label" id="hpLabel">100 / 100</div>
      </div>
    </div>
    <div class="stat-block">
      <span class="stat-icon">⭐</span>
      <div class="stat-bar-wrap">
        <div class="stat-bar xp-bar" id="xpBarFill" style="width:0%"></div>
        <div class="stat-bar-label" id="xpLabel">Lv 1 · 0 / 10</div>
      </div>
    </div>
    <div class="stat-chip gold" id="gold">🪙 0</div>
    <div class="stat-chip" id="stats">DMG 5 · ROF 1.0/s · SPD 1.0</div>
    <div class="hud-buttons">
      <button id="shopBtn" class="btn" title="Open Shop (K)">🛒 Shop</button>
      <button id="skillsBtn" class="btn" title="Open Skill Tree (L)">🌳 Skills</button>
      <button id="fullscreenBtn" class="btn">⛶ Fullscreen</button>
    </div>
  </div>

  <!-- Character Selection UI (contents built dynamically by game.js) -->
  <div id="characterSelect" class="panel"></div>

  <canvas id="gameCanvas" width="1024" height="768"></canvas>
  
  <!-- death screen -->
  <div id="deathOverlay" style="
    display:none;
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
    z-index:1000;
    align-items:center;
    justify-content:center;
  ">
    <div class="panel" style="width:min(90vw, 420px); color:var(--text-parchment); text-align:center; padding:28px 24px;">
      <h1 style="color:#ff6b6b; font-size:26px; letter-spacing:0.05em; text-shadow:0 2px 10px rgba(255,0,0,0.3);">Game Over</h1>
      <p id="essenceEarned" style="color:var(--accent-purple); font-size:15px; font-weight:600;"></p>
      <p><button id="restartBtn" class="btn" style="padding:10px 22px; font-size:14px;">Click to Restart</button></p>
      <p style="margin-top:14px;">
        <a href="https://mirageonlineclassic.com" target="_blank" style="color:var(--accent-blue); text-decoration:none; font-size:12px;">
          Try Mirage Online Classic the hit pixel MMO
        </a>
      </p>
    </div>
  </div>

  <!-- Mobile Controls -->
  <div id="mobile-controls">
    <div id="joystickBase">
      <div id="joystickKnob"></div>
    </div>
  </div>

  <div id="mobile-actions">
    <button id="btnAttack" class="control">⚔</button>
    <button id="btnSpecial" class="control" title="Blink">★</button>
    <button id="btnShop" class="control" title="Shop">🛒</button>
    <button id="btnSkills" class="control" title="Skill Tree">🌳</button>
  </div>

  <!-- Background Music -->
<audio id="bgMusic" src="assets/background.mp3" loop autoplay muted></audio>
<button id="muteBtn">Mute</button>

  <script type="module" src="js/game.js"></script>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const hud = document.getElementById("hud");
    const mobileControls = document.getElementById('mobile-controls');
    const mobileActions = document.getElementById('mobile-actions');

    // Background music control
    const bgMusic = document.getElementById("bgMusic");
    const muteBtn = document.getElementById("muteBtn");

    muteBtn.addEventListener("click", () => {
      if (bgMusic.paused) {
        bgMusic.play();
        muteBtn.textContent = "Mute";
      } else {
        bgMusic.pause();
        muteBtn.textContent = "Unmute";
      }
    });

    // Restart button logic
    document.getElementById("restartBtn").addEventListener("click", () => {
      location.reload();
    });

    // Hide mobile controls on non-touch devices
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (!isTouchDevice) {
      mobileControls.style.display = 'none';
      mobileActions.style.display = 'none';
    }

    function resizeCanvas() {
      const aspect = 1024 / 768;
      const maxWidth = window.innerWidth;
      const maxHeight = window.innerHeight - hud.offsetHeight - 16; // leave room for HUD
      let width = maxWidth;
      let height = width / aspect;

      if (height > maxHeight) {
        height = maxHeight;
        width = height * aspect;
      }

      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
    }

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("orientationchange", resizeCanvas);
    resizeCanvas();

    const btn = document.getElementById("fullscreenBtn");

    btn.addEventListener("click", async () => {
      const canvas = document.getElementById("gameCanvas");

      // Request fullscreen
      if (canvas.requestFullscreen) await canvas.requestFullscreen();
      else if (canvas.webkitRequestFullscreen) await canvas.webkitRequestFullscreen();

      // Optional: lock pointer for mouse/gamepad
      if (canvas.requestPointerLock) canvas.requestPointerLock();

      console.log("Fullscreen & pointer lock active!");
    });
  </script>
</body>
</html>
